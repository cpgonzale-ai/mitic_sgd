<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Test React sin Babel</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>
    <script>
        // React sin Babel - versión mínima
        const { createElement, useState } = React;

        const App = () => {
            const [contador, setContador] = useState(0);
            
            return createElement('div', { className: 'min-h-screen bg-gray-100 flex items-center justify-center p-4' },
                createElement('div', { className: 'bg-white rounded-2xl shadow-xl p-8 max-w-md w-full text-center' },
                    createElement('h1', { className: 'text-2xl font-bold text-blue-600 mb-4' }, '✅ React funciona sin Babel'),
                    createElement('p', { className: 'text-gray-600 mb-6' }, 'Si ves esto, todo está correcto.'),
                    createElement('button', {
                        onClick: () => setContador(contador + 1),
                        className: 'bg-blue-600 text-white px-6 py-3 rounded-xl hover:bg-blue-700 transition shadow-lg'
                    }, `Clics: ${contador}`),
                    createElement('p', { className: 'text-xs text-gray-400 mt-6' }, 'Presiona F12 para ver la consola')
                )
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(createElement(App));
        console.log('✅ App renderizada correctamente');
    </script>
</body>
</html>
